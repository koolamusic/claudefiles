# claudefiles.yaml
name: koolamusic/claudefiles
description: Portable Claude Code configuration

install:
  # Where to copy files — "global" = ~/.claude/, "local" = ./.claude/ in current project
  targets:
    skills: skills/        # copy all skill dirs into <target>/skills/
    commands: commands/     # copy all .md files into <target>/commands/
    sounds: sounds/        # copy all files into <target>/sounds/
    hooks: hooks/          # copy all hook scripts into <target>/hooks/
    claude_md: dotfiles/CLAUDE.md  # deploy global CLAUDE.md to <target>/CLAUDE.md
    nvim:
      source: dotfiles/nvim/        # copy full nvim config to ~/.config/nvim/
      dest: ~/.config/nvim/
      skip_if_exists: true           # never overwrite an existing nvim config
    # plugins/ are not copied by setup — Claude Code installs them from the
    # koolamusic/claudefiles marketplace via extraKnownMarketplaces in settings

settings:
  # These get smart-merged into the target settings.json
  hooks:
    SessionStart:
      - matcher: startup
        command: 'nohup {{sound_player}} $HOME/.claude/sounds/good-to-go-sir.wav >/dev/null 2>&1 &'
      - matcher: startup
        command: '$HOME/.claude/hooks/retro-reminder.sh'
        timeout: 5
    UserPromptSubmit:
      - matcher: '.*'
        command: "bash -c 'sounds=($HOME/.claude/sounds/orders-received.wav $HOME/.claude/sounds/affirmative.wav $HOME/.claude/sounds/right-away-sir.wav $HOME/.claude/sounds/read-you.wav $HOME/.claude/sounds/cant-believe.wav $HOME/.claude/sounds/this-too.wav $HOME/.claude/sounds/claudrophobic.wav); nohup {{sound_player}} \"${sounds[$RANDOM % ${#sounds[@]}]}\" >/dev/null 2>&1 &'"
    Stop:
      - matcher: '.*'
        command: "bash -c 'sounds=($HOME/.claude/sounds/jobs-finished.wav $HOME/.claude/sounds/orders-captain.wav $HOME/.claude/sounds/reporting-for-duty.wav); nohup {{sound_player}} \"${sounds[$RANDOM % ${#sounds[@]}]}\" >/dev/null 2>&1 &'"
    PostToolUse:
      - matcher: 'Write|Edit'
        command: '$HOME/.claude/hooks/shaping-ripple.sh'
        timeout: 5
      - matcher: 'Edit|Write|Bash'
        command: '$HOME/.claude/hooks/retro-trigger.sh'
        timeout: 10
  plugins:
    - feature-dev@claude-plugins-official
    - ralph-loop@claude-plugins-official
    - ux@claudefiles
    - jira@claudefiles                    # primary sprint workflow — see plugins/jira/README.md
  extraKnownMarketplaces:
    claudefiles:
      source:
        source: github
        repo: koolamusic/claudefiles
  preferences:
    alwaysThinkingEnabled: true

env:
  # Required environment variables — appended to shell rc if missing
  USER_TYPE: ant

platform:
  macos:
    sound_player: afplay
  linux:
    sound_player: aplay

experimental:
  # Opt-in features. /setup prompts whether to enable any of these during
  # installation. Each feature declares how opting in mutates settings.json:
  #   - `settings:` — a settings fragment deep-merged into the final
  #     settings.json (array-valued keys like hooks.PostToolUse are appended,
  #     not replaced). Used for wiring up hook scripts copied by default.
  #   - `enablePlugin:` — a plugin name (e.g. `<plugin>@<marketplace>`)
  #     that gets added to `enabledPlugins` on opt-in. Claude Code installs
  #     the plugin from its marketplace on next startup. Use for plugins
  #     that ship commands/agents and are NOT listed under top-level
  #     `settings.plugins:` (i.e. not default-enabled).
  # A feature MAY declare both keys; opt-in runs both actions. The backing
  # files (hook scripts, etc.) are still copied by default — opt-in just
  # wires them up. Users can flip features on/off later by editing
  # settings.json directly.
  features:
    - name: context-monitor
      description: >
        PostToolUse hook that reads the session transcript and warns the
        agent when context usage crosses thresholds (35% remaining =
        WARNING, 25% = CRITICAL). Debounces to avoid spam. Jira-aware:
        suggests /jira:retro at CRITICAL when a .jira/ sprint is active.
        ~130 lines of bash; requires jq. File: hooks/context-monitor.sh.
      settings:
        hooks:
          PostToolUse:
            - matcher: '.*'
              command: '$HOME/.claude/hooks/context-monitor.sh'
              timeout: 5
    - name: studio
      description: >
        Per-project workflow workspace — hosts `.planning/`, `.jira/`,
        `.retrospective/`, `.uat/` state as symlinks into a private
        `~/.studio/` git repo, keeping the project repo clean. Ships
        `/studio:setup`, `/studio:sync`, `/studio:adopt`, `/studio:migrate`.
        Enabling this will install the studio plugin; you'll separately
        need to clone or create `~/.studio/` before running
        `/studio:setup`. See plugins/studio/README.md for the full story
        including Windows / container fallback.
      enablePlugin: studio@claudefiles

cleanup:
  # Files/dirs to remove after extraction is done (in the repo itself during development)
  - .resource/
